name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        # Set the permissions to the lowest permissions possible needed for your steps.
        # Copilot will be given its own token for its operations.
        permissions:
            # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
            contents: read

        # You can define any steps you want, and they will run before the agent starts.
        # If you do not check out your code, Copilot will do this for you.
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: "Library: Clone translations"
              uses: actions/checkout@v5
              with:
                  repository: vivid-planet/comet-lang
                  token: ${{ secrets.GITHUB_TOKEN }}
                  path: "demo/admin/lang/comet-lang"

            - name: "Demo Admin: Clone translations"
              uses: actions/checkout@v5
              with:
                  repository: vivid-planet/comet-demo-lang
                  token: ${{ secrets.GITHUB_TOKEN }}
                  path: "demo/admin/lang/comet-demo-lang"

            - name: "Demo Site: Clone translations"
              uses: actions/checkout@v5
              with:
                  repository: vivid-planet/comet-demo-lang
                  token: ${{ secrets.GITHUB_TOKEN }}
                  path: "demo/site/lang/comet-demo-lang"

            - name: "Demo Api: Clone translations"
              uses: actions/checkout@v4
              with:
                  repository: vivid-planet/comet-demo-lang
                  token: ${{ secrets.GITHUB_TOKEN }}
                  path: "demo/api/lang/comet-demo-lang"

            - uses: pnpm/action-setup@v4

            - name: Use Node.js 24.x
              uses: actions/setup-node@v5
              with:
                  node-version: 24
                  registry-url: "https://registry.npmjs.org"
                  cache: "pnpm" # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-dependencies

            # Cache all package build outputs in a single cache entry
            # Uses restore-keys for partial matching when only some packages change
            - name: Cache package builds
              uses: actions/cache@v4
              with:
                  path: |
                      packages/*/lib
                      packages/*/*/lib
                      .package-build-hashes
                  # Note: hash patterns (src, bin, icons, package.json, tsconfig) must stay in sync
                  # with the per-package definitions in the "Determine packages to build" step below
                  key: ${{ runner.os }}-pkg-builds-${{ hashFiles('packages/**/src/**', 'packages/**/bin/**', 'packages/**/icons/**', 'packages/**/package.json', 'packages/**/tsconfig*.json', 'pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pkg-builds-

            # Determine which packages need building by comparing per-package source hashes
            - name: Determine packages to build
              id: check-builds
              run: |
                  # Package definitions: name|directory|extra-hash-dirs (space-separated, beyond src/)
                  PACKAGES="
                  cli|packages/cli|bin
                  eslint-plugin|packages/eslint-plugin|
                  admin|packages/admin/admin|
                  admin-color-picker|packages/admin/admin-color-picker|
                  admin-date-time|packages/admin/admin-date-time|
                  admin-generator|packages/admin/admin-generator|bin
                  admin-icons|packages/admin/admin-icons|icons
                  admin-rte|packages/admin/admin-rte|
                  brevo-admin|packages/admin/brevo-admin|
                  cms-admin|packages/admin/cms-admin|
                  api-generator|packages/api/api-generator|bin
                  brevo-api|packages/api/brevo-api|
                  cms-api|packages/api/cms-api|
                  mail-react|packages/mail-react|
                  site-nextjs|packages/site/site-nextjs|
                  site-react|packages/site/site-react|
                  "

                  EARLY_PACKAGES="cli eslint-plugin"
                  EARLY_FILTERS=""
                  MAIN_FILTERS=""
                  mkdir -p .package-build-hashes

                  while IFS='|' read -r name dir extra_dirs; do
                      name=$(echo "$name" | xargs)
                      dir=$(echo "$dir" | xargs)
                      extra_dirs=$(echo "$extra_dirs" | xargs)
                      [ -z "$name" ] && continue

                      # Compute hash of source + config files + lockfile
                      CURRENT_HASH=$(
                          {
                              find "$dir/src" -type f 2>/dev/null | sort | xargs -r sha256sum 2>/dev/null
                              for ed in $extra_dirs; do
                                  find "$dir/$ed" -type f 2>/dev/null | sort | xargs -r sha256sum 2>/dev/null
                              done
                              sha256sum "$dir/package.json" 2>/dev/null
                              for f in "$dir"/tsconfig*.json; do [ -f "$f" ] && sha256sum "$f"; done
                              sha256sum pnpm-lock.yaml 2>/dev/null
                          } | sha256sum | cut -d' ' -f1
                      )

                      STORED_HASH=""
                      [ -f ".package-build-hashes/$name" ] && STORED_HASH=$(cat ".package-build-hashes/$name")

                      # Also check lib/ exists as safety net for partial cache restores
                      if [ "$CURRENT_HASH" != "$STORED_HASH" ] || [ ! -d "$dir/lib" ]; then
                          echo "Package @comet/$name needs rebuild"
                          echo "$CURRENT_HASH" > ".package-build-hashes/$name"
                          if echo "$EARLY_PACKAGES" | grep -qw "$name"; then
                              EARLY_FILTERS="$EARLY_FILTERS --filter @comet/$name"
                          else
                              MAIN_FILTERS="$MAIN_FILTERS --filter @comet/$name"
                          fi
                      else
                          echo "Package @comet/$name is up to date"
                      fi
                  done <<< "$PACKAGES"

                  echo "early-filters=$EARLY_FILTERS" >> "$GITHUB_OUTPUT"
                  echo "main-filters=$MAIN_FILTERS" >> "$GITHUB_OUTPUT"

            - run: pnpm install --frozen-lockfile

            - name: Build @comet/cli and @comet/eslint-plugin (if not cached)
              if: steps.check-builds.outputs.early-filters != ''
              run: pnpm ${{ steps.check-builds.outputs.early-filters }} run build

            - run: CI=false pnpm run copy-project-files

            - name: create site-config-envs
              run: pnpm run create-site-configs-env

            - run: pnpm run setup:download-oauth2-proxy

            - run: pnpm run setup:download-mitmproxy

            - name: Build packages (only uncached)
              if: steps.check-builds.outputs.main-filters != ''
              run: pnpm --recursive ${{ steps.check-builds.outputs.main-filters }} run build
