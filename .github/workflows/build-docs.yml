name: Build Docs

on:
    pull_request:
        paths:
            - docs/**
            - storybook/**
    push:
        paths:
            - docs/**
            - storybook/**
        branches:
            - main
            - next

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6

            - uses: ./.github/actions/setup

            - name: Build docs
              run: pnpm build:docs
