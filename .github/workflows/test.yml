name: Test

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
    push:
        branches:
            - main
            - next

jobs:
    test-unit:
        name: Test (unit)
        runs-on: ubuntu-latest
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "true"

            - name: Test (unit)
              run: pnpm run test:coverage

            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: test-results-unit
                  path: |
                      packages/*/junit-unit.xml
                      packages/*/*/junit-unit.xml
                  overwrite: true

            - name: Merge coverage reports
              if: success() || failure()
              run: pnpm run coverage:report

            - name: Upload coverage report
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: coverage-report
                  path: |
                      coverage
                      packages/*/coverage
                      packages/*/*/coverage
                  overwrite: true

            - name: Code coverage summary
              uses: irongut/CodeCoverageSummary@v1.3.0
              if: success() || failure()
              with:
                  filename: coverage/cobertura-coverage.xml
                  badge: true
                  format: markdown
                  hide_complexity: true
                  indicators: true
                  output: file

            - name: Write coverage summary to job summary
              if: success() || failure()
              run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

    test-storybook:
        name: Test (storybook)
        runs-on: ubuntu-latest
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref || github.ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "true"

            - name: Install Playwright Browsers
              run: pnpm --filter comet-storybook exec playwright install chromium-headless-shell

            - name: Test (storybook)
              run: pnpm run test:storybook

            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: test-results-storybook
                  path: |
                      packages/*/junit-storybook.xml
                      packages/*/*/junit-storybook.xml
                      storybook/junit.xml
                  overwrite: true
