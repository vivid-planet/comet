name: Test

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
    push:
        branches:
            - main
            - next

jobs:
    test-unit:
        name: Test (unit)
        runs-on: ubuntu-latest
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "true"

            - name: Test (unit)
              run: pnpm run test:coverage

            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: test-results-unit
                  path: |
                      packages/*/junit-unit.xml
                      packages/*/*/junit-unit.xml
                  overwrite: true

            - name: Upload coverage data
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: coverage-data-unit
                  path: |
                      packages/*/coverage
                      packages/*/*/coverage
                  overwrite: true

    test-storybook:
        name: Test (storybook)
        runs-on: ubuntu-latest
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref || github.ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "true"

            - name: Install Playwright Browsers
              run: pnpm --filter comet-storybook exec playwright install chromium-headless-shell

            - name: Test (storybook)
              run: pnpm run test:coverage:storybook

            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: test-results-storybook
                  path: |
                      packages/*/junit-storybook.xml
                      packages/*/*/junit-storybook.xml
                      storybook/junit.xml
                  overwrite: true

            - name: Upload coverage data
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: coverage-data-storybook
                  path: |
                      packages/*/coverage-storybook
                      packages/*/*/coverage-storybook
                  overwrite: true

    coverage-report:
        name: Coverage report
        runs-on: ubuntu-latest
        needs: [test-unit, test-storybook]
        if: success() || failure()
        steps:
            - uses: actions/checkout@v6

            - uses: ./.github/actions/setup
              with:
                  setup-ci: "false"

            - name: Download unit coverage data
              uses: actions/download-artifact@v7
              continue-on-error: true
              with:
                  name: coverage-data-unit
                  path: packages

            - name: Download storybook coverage data
              uses: actions/download-artifact@v7
              continue-on-error: true
              with:
                  name: coverage-data-storybook
                  path: packages

            - name: Merge coverage reports
              run: pnpm run coverage:report

            - name: Upload coverage report
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report
                  path: |
                      coverage
                      packages/*/coverage
                      packages/*/*/coverage
                      packages/*/coverage-storybook
                      packages/*/*/coverage-storybook
                  overwrite: true

            - name: Write coverage summary to job summary
              run: node scripts/coverage-summary.mjs >> "$GITHUB_STEP_SUMMARY"
