name: Test

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
    push:
        branches:
            - main
            - next

jobs:
    test-unit:
        name: Test (unit) ${{ matrix.package }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { package: "@comet/admin", slug: "admin" }
                    - { package: "@comet/admin-generator", slug: "admin-generator" }
                    - { package: "@comet/admin-rte", slug: "admin-rte" }
                    - { package: "@comet/brevo-api", slug: "brevo-api" }
                    - { package: "@comet/cli", slug: "cli" }
                    - { package: "@comet/cms-admin", slug: "cms-admin" }
                    - { package: "@comet/cms-api", slug: "cms-api" }
                    - { package: "@comet/eslint-plugin", slug: "eslint-plugin" }
                    - { package: "@comet/mail-react", slug: "mail-react" }
                    - { package: "@comet/site-nextjs", slug: "site-nextjs" }
                    - { package: "@comet/site-react", slug: "site-react" }
                    - { package: "comet-demo-api", slug: "demo-api" }
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "true"

            - name: Test (unit)
              run: pnpm --filter '${{ matrix.package }}' run test:unit

            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: test-results-unit-${{ matrix.slug }}
                  path: |
                      packages/*/junit-unit.xml
                      packages/*/*/junit-unit.xml
                      demo/*/junit-unit.xml
                  overwrite: true
                  if-no-files-found: ignore

    test-unit-all:
        name: Test (unit)
        runs-on: ubuntu-latest
        needs: test-unit
        if: ${{ !cancelled() }}
        steps:
            - name: Verify all unit test lanes succeeded
              run: |
                  if [ "${{ needs.test-unit.result }}" != "success" ]; then
                      echo "One or more unit test lanes failed: ${{ needs.test-unit.result }}"
                      exit 1
                  fi

    test-storybook:
        name: Test (storybook) ${{ matrix.package }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { package: "@comet/admin", slug: "admin" }
                    - { package: "@comet/cms-admin", slug: "cms-admin" }
                    - { package: "@comet/mail-react", slug: "mail-react" }
                    - { package: "comet-storybook", slug: "storybook" }
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref || github.ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "true"

            - name: Install Playwright Browsers
              run: pnpm --filter '${{ matrix.package }}' exec playwright install chromium-headless-shell

            - name: Test (storybook)
              run: pnpm --filter '${{ matrix.package }}' run test:storybook

            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: test-results-storybook-${{ matrix.slug }}
                  path: |
                      packages/*/junit-storybook.xml
                      packages/*/*/junit-storybook.xml
                      storybook/junit.xml
                  overwrite: true
                  if-no-files-found: ignore

    test-storybook-all:
        name: Test (storybook)
        runs-on: ubuntu-latest
        needs: test-storybook
        if: ${{ !cancelled() }}
        steps:
            - name: Verify all storybook test lanes succeeded
              run: |
                  if [ "${{ needs.test-storybook.result }}" != "success" ]; then
                      echo "One or more storybook test lanes failed: ${{ needs.test-storybook.result }}"
                      exit 1
                  fi
