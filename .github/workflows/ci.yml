name: CI

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
    push:
        branches:
            - main
            - next

jobs:
    build-packages:
        name: Build packages
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "true"

            - name: Pack build outputs
              run: |
                  git ls-files --others --ignored --exclude-standard -- packages \
                      | grep -v '/node_modules/' \
                      > /tmp/build-outputs.txt
                  echo "Files in tarball: $(wc -l < /tmp/build-outputs.txt)"
                  tar -czf /tmp/built-packages.tar.gz -T /tmp/build-outputs.txt
                  ls -lh /tmp/built-packages.tar.gz

            - uses: actions/upload-artifact@v7
              with:
                  name: built-packages
                  path: /tmp/built-packages.tar.gz
                  retention-days: 1
                  if-no-files-found: error

    lint-package:
        name: Lint ${{ matrix.package }}
        runs-on: ubuntu-latest
        needs: build-packages
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { package: "@comet/admin", slug: "admin" }
                    - { package: "@comet/admin-color-picker", slug: "admin-color-picker" }
                    - { package: "@comet/admin-date-time", slug: "admin-date-time" }
                    - { package: "@comet/admin-generator", slug: "admin-generator" }
                    - { package: "@comet/admin-icons", slug: "admin-icons" }
                    - { package: "@comet/admin-rte", slug: "admin-rte" }
                    - { package: "@comet/api-generator", slug: "api-generator" }
                    - { package: "@comet/brevo-admin", slug: "brevo-admin" }
                    - { package: "@comet/brevo-api", slug: "brevo-api" }
                    - { package: "@comet/cli", slug: "cli" }
                    - { package: "@comet/cms-admin", slug: "cms-admin" }
                    - { package: "@comet/cms-api", slug: "cms-api" }
                    - { package: "@comet/eslint-config", slug: "eslint-config" }
                    - { package: "@comet/eslint-plugin", slug: "eslint-plugin" }
                    - { package: "@comet/mail-react", slug: "mail-react" }
                    - { package: "@comet/site-nextjs", slug: "site-nextjs" }
                    - { package: "@comet/site-react", slug: "site-react" }
                    - { package: "comet-demo-admin", slug: "demo-admin" }
                    - { package: "comet-demo-api", slug: "demo-api" }
                    - { package: "comet-demo-site", slug: "demo-site" }
                    - { package: "comet-docs", slug: "docs" }
                    - { package: "comet-storybook", slug: "storybook" }
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - name: "Library: Clone translations"
              if: matrix.package == 'comet-demo-admin'
              uses: actions/checkout@v6
              with:
                  repository: vivid-planet/comet-lang
                  path: "demo/admin/lang/comet-lang"

            - name: "Demo Admin: Clone translations"
              if: matrix.package == 'comet-demo-admin'
              uses: actions/checkout@v6
              with:
                  repository: vivid-planet/comet-demo-lang
                  path: "demo/admin/lang/comet-demo-lang"

            - name: "Demo Site: Clone translations"
              if: matrix.package == 'comet-demo-site'
              uses: actions/checkout@v6
              with:
                  repository: vivid-planet/comet-demo-lang
                  path: "demo/site/lang/comet-demo-lang"

            - name: "Demo Api: Clone translations"
              if: matrix.package == 'comet-demo-api'
              uses: actions/checkout@v6
              with:
                  repository: vivid-planet/comet-demo-lang
                  path: "demo/api/lang/comet-demo-lang"

            - uses: ./.github/actions/setup
              with:
                  build-packages: "false"

            - uses: actions/download-artifact@v7
              with:
                  name: built-packages
                  path: /tmp
            - name: Extract build outputs
              run: tar -xzf /tmp/built-packages.tar.gz

            - name: Lint
              run: pnpm --filter '${{ matrix.package }}' run lint:ci

    lint-root:
        name: Lint (root)
        runs-on: ubuntu-latest
        needs: build-packages
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "false"

            - uses: actions/download-artifact@v7
              with:
                  name: built-packages
                  path: /tmp
            - name: Extract build outputs
              run: tar -xzf /tmp/built-packages.tar.gz

            - name: Lint root
              run: pnpm run lint:root

            - name: Lint knip
              run: pnpm run lint:knip

            - name: Check translated messages have no duplicate ids
              run: pnpm run intl:extract

            - name: Regenerate block-meta
              run: pnpm --filter '@comet/cms-api' run generate-block-meta

            - name: Regenerate schema
              run: pnpm --filter '@comet/cms-api' run generate-schema

            - name: Check generated files are up to date
              run: git diff --exit-code HEAD --

    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: [lint-package, lint-root]
        if: ${{ !cancelled() }}
        steps:
            - name: Verify all lint jobs succeeded
              run: |
                  if [ "${{ needs.lint-package.result }}" != "success" ] || [ "${{ needs.lint-root.result }}" != "success" ]; then
                      echo "lint-package=${{ needs.lint-package.result }}, lint-root=${{ needs.lint-root.result }}"
                      exit 1
                  fi

    test-unit:
        name: Test (unit) ${{ matrix.package }}
        runs-on: ubuntu-latest
        needs: build-packages
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { package: "@comet/admin", slug: "admin" }
                    - { package: "@comet/admin-generator", slug: "admin-generator" }
                    - { package: "@comet/admin-rte", slug: "admin-rte" }
                    - { package: "@comet/brevo-api", slug: "brevo-api" }
                    - { package: "@comet/cli", slug: "cli" }
                    - { package: "@comet/cms-admin", slug: "cms-admin" }
                    - { package: "@comet/cms-api", slug: "cms-api" }
                    - { package: "@comet/eslint-plugin", slug: "eslint-plugin" }
                    - { package: "@comet/mail-react", slug: "mail-react" }
                    - { package: "@comet/site-nextjs", slug: "site-nextjs" }
                    - { package: "@comet/site-react", slug: "site-react" }
                    - { package: "comet-demo-api", slug: "demo-api" }
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "false"

            - uses: actions/download-artifact@v7
              with:
                  name: built-packages
                  path: /tmp
            - name: Extract build outputs
              run: tar -xzf /tmp/built-packages.tar.gz

            - name: Test (unit)
              run: pnpm --filter '${{ matrix.package }}' run test:unit

            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: test-results-unit-${{ matrix.slug }}
                  path: |
                      packages/*/junit-unit.xml
                      packages/*/*/junit-unit.xml
                      demo/*/junit-unit.xml
                  overwrite: true
                  if-no-files-found: ignore

    test-unit-all:
        name: Test (unit)
        runs-on: ubuntu-latest
        needs: test-unit
        if: ${{ !cancelled() }}
        steps:
            - name: Verify all unit test lanes succeeded
              run: |
                  if [ "${{ needs.test-unit.result }}" != "success" ]; then
                      echo "One or more unit test lanes failed: ${{ needs.test-unit.result }}"
                      exit 1
                  fi

    test-storybook:
        name: Test (storybook) ${{ matrix.package }}
        runs-on: ubuntu-latest
        needs: build-packages
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { package: "@comet/admin", slug: "admin" }
                    - { package: "@comet/cms-admin", slug: "cms-admin" }
                    - { package: "@comet/mail-react", slug: "mail-react" }
                    - { package: "comet-storybook", slug: "storybook" }
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref || github.ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "false"

            - uses: actions/download-artifact@v7
              with:
                  name: built-packages
                  path: /tmp
            - name: Extract build outputs
              run: tar -xzf /tmp/built-packages.tar.gz

            - name: Install Playwright Browsers
              run: pnpm --filter '${{ matrix.package }}' exec playwright install chromium-headless-shell

            - name: Test (storybook)
              run: pnpm --filter '${{ matrix.package }}' run test:storybook

            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: test-results-storybook-${{ matrix.slug }}
                  path: |
                      packages/*/junit-storybook.xml
                      packages/*/*/junit-storybook.xml
                      storybook/junit.xml
                  overwrite: true
                  if-no-files-found: ignore

    test-storybook-all:
        name: Test (storybook)
        runs-on: ubuntu-latest
        needs: test-storybook
        if: ${{ !cancelled() }}
        steps:
            - name: Verify all storybook test lanes succeeded
              run: |
                  if [ "${{ needs.test-storybook.result }}" != "success" ]; then
                      echo "One or more storybook test lanes failed: ${{ needs.test-storybook.result }}"
                      exit 1
                  fi

    chromatic:
        name: Chromatic
        runs-on: ubuntu-latest
        needs: build-packages
        if: github.event_name == 'push' || github.base_ref == 'main' || github.base_ref == 'next'
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "false"

            - uses: actions/download-artifact@v7
              with:
                  name: built-packages
                  path: /tmp
            - name: Extract build outputs
              run: tar -xzf /tmp/built-packages.tar.gz

            - name: Publish comet-admin to Chromatic
              uses: chromaui/action@v1
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_ADMIN }}
                  workingDir: packages/admin/admin

            - name: Publish comet-cms-admin to Chromatic
              uses: chromaui/action@v1
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_CMS_ADMIN }}
                  workingDir: packages/admin/cms-admin

            - name: Publish comet-mail-react to Chromatic
              uses: chromaui/action@v1
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_MAIL_REACT }}
                  workingDir: packages/mail-react
