name: CI

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
    push:
        branches:
            - main
            - next

jobs:
    discover:
        name: Discover affected packages
        runs-on: ubuntu-latest
        outputs:
            any-affected: ${{ steps.matrix.outputs.any-affected }}
            run-all: ${{ steps.detect.outputs.run-all }}
            lint-matrix: ${{ steps.matrix.outputs.lint-matrix }}
            test-unit-matrix: ${{ steps.matrix.outputs.test-unit-matrix }}
            test-storybook-matrix: ${{ steps.matrix.outputs.test-storybook-matrix }}
            chromatic-needed: ${{ steps.matrix.outputs.chromatic-needed }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Determine base SHA
              id: base
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                      git fetch --depth=50 origin "${{ github.base_ref }}"
                      base_sha=$(git rev-parse "origin/${{ github.base_ref }}")
                  else
                      base_sha=$(git rev-parse HEAD~1)
                  fi
                  echo "sha=$base_sha" >> "$GITHUB_OUTPUT"
                  echo "Base SHA: $base_sha"
                  echo "Head SHA: $(git rev-parse HEAD)"

            - name: Detect infrastructure changes
              id: detect
              run: |
                  base="${{ steps.base.outputs.sha }}"
                  changed=$(git diff --name-only "$base"...HEAD)
                  echo "Changed files:"
                  echo "$changed" | sed 's/^/  /'
                  if echo "$changed" | grep -E '^(pnpm-lock\.yaml|package\.json|tsconfig.*\.json|\.github/(workflows|actions)/|\.prettierrc|\.editorconfig|knip\.json|lint-staged\.config\.|copy-project-files\.js)' > /dev/null; then
                      echo "run-all=true" >> "$GITHUB_OUTPUT"
                      echo "→ infrastructure change detected, will run full matrix"
                  else
                      echo "run-all=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Compute affected matrices
              id: matrix
              run: |
                  base="${{ steps.base.outputs.sha }}"
                  run_all="${{ steps.detect.outputs.run-all }}"

                  if [ "$run_all" = "true" ]; then
                      filter='*'
                  else
                      filter="...[$base]"
                  fi

                  paths=$(pnpm --silent --filter "$filter" exec pwd 2>/dev/null || true)

                  echo "Affected package directories:"
                  echo "$paths" | sed 's/^/  /'

                  result=$(PATHS="$paths" node -e '
                    const fs = require("fs");
                    const path = require("path");
                    const paths = process.env.PATHS.split("\n").filter(Boolean);
                    const pkgs = paths.map(p => {
                      try {
                        const pj = JSON.parse(fs.readFileSync(path.join(p, "package.json"), "utf8"));
                        return { name: pj.name, scripts: pj.scripts || {} };
                      } catch { return null; }
                    }).filter(p => p && p.name && p.name !== "root");
                    const slug = n => n.replace(/^@comet\//, "").replace(/^comet-/, "");
                    const entry = p => ({ package: p.name, slug: slug(p.name) });
                    const chromaticPkgs = ["@comet/admin", "@comet/cms-admin", "@comet/mail-react"];
                    console.log(JSON.stringify({
                      lint: pkgs.filter(p => p.scripts["lint:ci"]).map(entry),
                      testUnit: pkgs.filter(p => p.scripts["test:unit"]).map(entry),
                      testStorybook: pkgs.filter(p => p.scripts["test:storybook"]).map(entry),
                      chromaticNeeded: pkgs.some(p => chromaticPkgs.includes(p.name)),
                      anyAffected: pkgs.length > 0,
                    }));
                  ')

                  echo "Result: $result"

                  echo "lint-matrix=$(echo "$result" | jq -c '.lint')" >> "$GITHUB_OUTPUT"
                  echo "test-unit-matrix=$(echo "$result" | jq -c '.testUnit')" >> "$GITHUB_OUTPUT"
                  echo "test-storybook-matrix=$(echo "$result" | jq -c '.testStorybook')" >> "$GITHUB_OUTPUT"
                  echo "chromatic-needed=$(echo "$result" | jq -r '.chromaticNeeded')" >> "$GITHUB_OUTPUT"
                  echo "any-affected=$(echo "$result" | jq -r '.anyAffected')" >> "$GITHUB_OUTPUT"

    build-packages:
        name: Build packages
        runs-on: ubuntu-latest
        needs: discover
        if: needs.discover.outputs.any-affected == 'true'
        steps:
            - uses: actions/checkout@v6
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "true"

            - name: Pack build outputs
              run: |
                  git ls-files --others --ignored --exclude-standard -- packages \
                      | grep -v '/node_modules/' \
                      > /tmp/build-outputs.txt
                  echo "Files in tarball: $(wc -l < /tmp/build-outputs.txt)"
                  tar -czf /tmp/built-packages.tar.gz -T /tmp/build-outputs.txt
                  ls -lh /tmp/built-packages.tar.gz

            - uses: actions/upload-artifact@v7
              with:
                  name: built-packages
                  path: /tmp/built-packages.tar.gz
                  retention-days: 1
                  if-no-files-found: error

    lint-package:
        name: Lint ${{ matrix.package }}
        runs-on: ubuntu-latest
        needs: [discover, build-packages]
        if: needs.discover.outputs.lint-matrix != '[]'
        strategy:
            fail-fast: false
            matrix:
                include: ${{ fromJSON(needs.discover.outputs.lint-matrix) }}
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - name: "Library: Clone translations"
              if: matrix.package == 'comet-demo-admin'
              uses: actions/checkout@v6
              with:
                  repository: vivid-planet/comet-lang
                  path: "demo/admin/lang/comet-lang"

            - name: "Demo Admin: Clone translations"
              if: matrix.package == 'comet-demo-admin'
              uses: actions/checkout@v6
              with:
                  repository: vivid-planet/comet-demo-lang
                  path: "demo/admin/lang/comet-demo-lang"

            - name: "Demo Site: Clone translations"
              if: matrix.package == 'comet-demo-site'
              uses: actions/checkout@v6
              with:
                  repository: vivid-planet/comet-demo-lang
                  path: "demo/site/lang/comet-demo-lang"

            - name: "Demo Api: Clone translations"
              if: matrix.package == 'comet-demo-api'
              uses: actions/checkout@v6
              with:
                  repository: vivid-planet/comet-demo-lang
                  path: "demo/api/lang/comet-demo-lang"

            - uses: ./.github/actions/setup
              with:
                  build-packages: "false"

            - uses: actions/download-artifact@v7
              with:
                  name: built-packages
                  path: /tmp
            - name: Extract build outputs
              run: tar -xzf /tmp/built-packages.tar.gz

            - name: Lint
              run: pnpm --filter '${{ matrix.package }}' run lint:ci

    lint-root:
        name: Lint (root)
        runs-on: ubuntu-latest
        needs: [discover, build-packages]
        if: needs.discover.outputs.any-affected == 'true'
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "false"

            - uses: actions/download-artifact@v7
              with:
                  name: built-packages
                  path: /tmp
            - name: Extract build outputs
              run: tar -xzf /tmp/built-packages.tar.gz

            - name: Lint root
              run: pnpm run lint:root

            - name: Lint knip
              run: pnpm run lint:knip

            - name: Check translated messages have no duplicate ids
              run: pnpm run intl:extract

            - name: Regenerate block-meta
              run: pnpm --filter '@comet/cms-api' run generate-block-meta

            - name: Regenerate schema
              run: pnpm --filter '@comet/cms-api' run generate-schema

            - name: Check generated files are up to date
              run: git diff --exit-code HEAD --

    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: [lint-package, lint-root]
        if: ${{ !cancelled() }}
        steps:
            - name: Verify all lint jobs succeeded
              run: |
                  lp="${{ needs.lint-package.result }}"
                  lr="${{ needs.lint-root.result }}"
                  if [ "$lp" != "success" ] && [ "$lp" != "skipped" ]; then
                      echo "lint-package=$lp"
                      exit 1
                  fi
                  if [ "$lr" != "success" ] && [ "$lr" != "skipped" ]; then
                      echo "lint-root=$lr"
                      exit 1
                  fi

    test-unit:
        name: Test (unit) ${{ matrix.package }}
        runs-on: ubuntu-latest
        needs: [discover, build-packages]
        if: needs.discover.outputs.test-unit-matrix != '[]'
        strategy:
            fail-fast: false
            matrix:
                include: ${{ fromJSON(needs.discover.outputs.test-unit-matrix) }}
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "false"

            - uses: actions/download-artifact@v7
              with:
                  name: built-packages
                  path: /tmp
            - name: Extract build outputs
              run: tar -xzf /tmp/built-packages.tar.gz

            - name: Test (unit)
              run: pnpm --filter '${{ matrix.package }}' run test:unit

            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: test-results-unit-${{ matrix.slug }}
                  path: |
                      packages/*/junit-unit.xml
                      packages/*/*/junit-unit.xml
                      demo/*/junit-unit.xml
                  overwrite: true
                  if-no-files-found: ignore

    test-unit-all:
        name: Test (unit)
        runs-on: ubuntu-latest
        needs: test-unit
        if: ${{ !cancelled() }}
        steps:
            - name: Verify all unit test lanes succeeded
              run: |
                  r="${{ needs.test-unit.result }}"
                  if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
                      echo "test-unit=$r"
                      exit 1
                  fi

    test-storybook:
        name: Test (storybook) ${{ matrix.package }}
        runs-on: ubuntu-latest
        needs: [discover, build-packages]
        if: needs.discover.outputs.test-storybook-matrix != '[]'
        strategy:
            fail-fast: false
            matrix:
                include: ${{ fromJSON(needs.discover.outputs.test-storybook-matrix) }}
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.head.ref || github.ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "false"

            - uses: actions/download-artifact@v7
              with:
                  name: built-packages
                  path: /tmp
            - name: Extract build outputs
              run: tar -xzf /tmp/built-packages.tar.gz

            - name: Install Playwright Browsers
              run: pnpm --filter '${{ matrix.package }}' exec playwright install chromium-headless-shell

            - name: Test (storybook)
              run: pnpm --filter '${{ matrix.package }}' run test:storybook

            - name: Upload test results
              uses: actions/upload-artifact@v7
              if: success() || failure()
              with:
                  name: test-results-storybook-${{ matrix.slug }}
                  path: |
                      packages/*/junit-storybook.xml
                      packages/*/*/junit-storybook.xml
                      storybook/junit.xml
                  overwrite: true
                  if-no-files-found: ignore

    test-storybook-all:
        name: Test (storybook)
        runs-on: ubuntu-latest
        needs: test-storybook
        if: ${{ !cancelled() }}
        steps:
            - name: Verify all storybook test lanes succeeded
              run: |
                  r="${{ needs.test-storybook.result }}"
                  if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
                      echo "test-storybook=$r"
                      exit 1
                  fi

    chromatic:
        name: Chromatic
        runs-on: ubuntu-latest
        needs: [discover, build-packages]
        if: |
            (github.event_name == 'push' || github.base_ref == 'main' || github.base_ref == 'next')
            && needs.discover.outputs.chromatic-needed == 'true'
        steps:
            - run: echo "${{ github.actor }}"

            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - run: |
                  git config user.name github-actions
                  git config user.email github-actions@github.com

            - uses: ./.github/actions/setup
              with:
                  build-packages: "false"

            - uses: actions/download-artifact@v7
              with:
                  name: built-packages
                  path: /tmp
            - name: Extract build outputs
              run: tar -xzf /tmp/built-packages.tar.gz

            - name: Publish comet-admin to Chromatic
              uses: chromaui/action@v1
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_ADMIN }}
                  workingDir: packages/admin/admin

            - name: Publish comet-cms-admin to Chromatic
              uses: chromaui/action@v1
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_CMS_ADMIN }}
                  workingDir: packages/admin/cms-admin

            - name: Publish comet-mail-react to Chromatic
              uses: chromaui/action@v1
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN_MAIL_REACT }}
                  workingDir: packages/mail-react
