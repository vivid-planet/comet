schema: spec-driven

context: |
    Package: @comet/mail-react
    Stack: TypeScript, React, MJML (via @faire/mjml-react)
    Type: Library (published to npm)

    Goal: Single-package solution for building HTML emails with React and MJML.
    Projects install only this package (plus react) — no direct `@faire/mjml-react`.

    Current surface:
    - Re-exports all @faire/mjml-react components (prop types renamed to drop `I` prefix)
    - Custom components wrap/extend @faire/mjml-react — additive only, no breaking changes.
      Without new props, the component must work everywhere the base does (no new required
      providers or context). For example, a component must not call useTheme() unconditionally
      — use useOptionalTheme() and only require a theme when a prop needs it.
    - When a custom component replaces a re-export, only the custom version is exported
      (consumers never import @faire/mjml-react directly; the base must not be exposed)
    - Block factories (BlocksBlock, ListBlock, OneOfBlock, OptionalBlock) for rendering
      Comet CMS block data in mail templates
    - css() tagged template literal for IDE syntax highlighting

    Future direction:
    - Some components may gain Html variants (for use inside MJML ending tags),
      with their own API independent from the Mjml version

    Styling model (default-first):
    - Email clients that lack CSS support are typically desktop (e.g. Outlook).
      The base/default rendering must rely solely on inline styles (MJML props)
      and look correct without any <style> block.
    - Media queries (via registerStyles / <mj-style>) are a progressive
      enhancement for mobile viewports, which generally have good CSS support.
      Use max-width media queries (theme.breakpoints.*.belowMediaQuery) to
      target viewports below a breakpoint. Modern CSS features (flex, grid)
      are acceptable inside these media queries.

    Conventions:
    - No `as` type assertions — use type guards
    - ESM-only (type: module), .js extensions in imports
    - Part of the vivid-planet/comet monorepo (packages/mail-react)
    - Custom components live in `src/components/<concern>/` directories
      (e.g. `src/components/section/MjmlSection.tsx`)
    - Every custom component has a Storybook story in
      `src/components/<concern>/__stories__/<Component>.stories.tsx`
    - Exported components and props have TSDoc comments
    - Component file ordering: imports, types/props, main component, styles
      (registerStyles calls go below the component definition)
    - CSS class names follow BEM with camelCase blocks: block `mjmlSection`,
      element `mjmlSection__item`, modifier `mjmlSection--indented`.
      Every custom component applies its block class and merges any consumer-
      provided className via clsx: `clsx("mjmlSection", className)`.
      clsx is a dependency of this package.

rules:
    proposal:
        - Changes must not break existing @faire/mjml-react component API compatibility
    design:
        - Prefer wrapping @faire/mjml-react components over reimplementing
    tasks:
        - >-
            When a change affects library usage (new export, changed component API,
            bug fix, visual change), include a task to create a changeset file in the
            monorepo root (.changeset/ at the git root, two levels up from this package).
            No changeset is needed for internal-only changes (refactors, non-exported utils).
            The changeset must describe the change from the consumer's perspective — what
            is new or different in the API they use — not what was built or restructured
            internally. If a component already existed as a re-export, adding props to it
            is not "adding a component", it is "adding props to <Component>".
            See CONTRIBUTING.md in the repo root for changeset formatting guidelines.
        - >-
            When a change adds or modifies a custom component, include tasks to:
            (1) add or update the Storybook story in the component's __stories__/ directory,
            and (2) add or update TSDoc comments on the component and its exported props.
